name: CI & Sync to Gitee

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Nuxt .nuxt
        run: pnpm run dev

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

  sync:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GITEE_PRIVATE_KEY }}

      - name: Mirror to Gitee
        run: |
          git remote add gitee git@gitee.com:kwooshung/LofiTick.Desktop.UI.git || true
          git push gitee HEAD:main --tags --force
